<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kilpi – Editor popisků</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e12; --surface: #13151a; --card: #191c23;
  --border: #21252f; --border2: #2a2f3b;
  --accent: #c8f04a; --accent2: #4af0c2; --accent3: #f04a8a;
  --text: #e4e6f0; --muted: #5a6070; --dim: #363b48;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
#header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 50px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; justify-content: center; }
#headerLeft { display: flex; align-items: center; gap: 10px; flex: 1; }
#logo { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 15px; color: var(--accent); letter-spacing: 0.06em; margin-right: 4px; }
#logo span { color: var(--muted); font-weight: 400; font-size: 12px; }
#searchInput { flex: 1; max-width: 260px; background: var(--card); border: 1px solid var(--border2); color: var(--text); border-radius: 7px; padding: 6px 11px; font-size: 13px; outline: none; font-family: inherit; }
#searchInput:focus { border-color: var(--accent); }
#catFilter, #seasonFilter { background: var(--card); border: 1px solid var(--border2); color: var(--text); border-radius: 7px; padding: 6px 10px; font-size: 12px; outline: none; font-family: inherit; }
#catFilter { max-width: 190px; }
#seasonFilter { font-weight: bold; color: var(--accent); border-color: var(--accent); }
#headerRight { margin-left: auto; display: flex; align-items: center; gap: 8px; }
#editBadge { font-size: 11px; color: var(--accent); background: rgba(200,240,74,0.1); border: 1px solid rgba(200,240,74,0.25); border-radius: 100px; padding: 2px 9px; font-weight: 600; display: none; }
#statusMsg { font-size: 11px; color: var(--accent2); display: none; }
#configBtn { background: var(--card); border: 1px solid var(--border2); color: var(--muted); border-radius: 7px; padding: 5px 11px; font-size: 11px; cursor: pointer; font-family: inherit; }
#configBtn:hover { border-color: var(--border2); color: var(--text); }
#exportBtn { background: var(--accent); color: var(--bg); border: none; border-radius: 7px; padding: 5px 13px; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; }
#exportBtn:hover { opacity: 0.9; }
#masterBtn { background: #a0c8f0; border: none; color: #1a2a3a; border-radius: 7px; padding: 5px 13px; font-size: 11px; cursor: pointer; font-family: inherit; text-decoration: none; letter-spacing: 0.04em; font-weight: 700; }
#masterBtn:hover { background: #b8d8f8; }

/* LANG BAR */
#langBar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 16px; display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; align-items: center; }
.lpill { background: transparent; border: 1px solid var(--border2); color: var(--muted); border-radius: 100px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.05em; transition: all 0.1s; font-family: inherit; }
.lpill:hover { border-color: var(--accent); color: var(--accent); }
.lpill.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
#statsText { margin-left: auto; font-size: 11px; color: var(--muted); }

/* MAIN */
#main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar { width: 240px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
.pitem { padding: 10px 13px; border-bottom: 1px solid var(--border); cursor: pointer; border-left: 3px solid transparent; transition: background 0.1s; }
.pitem:hover { background: var(--card); }
.pitem.active { background: var(--card); border-left-color: var(--accent); }
.pitem-id { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
.pitem.active .pitem-id { color: var(--accent); }
.pitem-name { font-weight: 700; font-size: 14px; color: #c0c2cc; line-height: 1.2; }
.pitem.active .pitem-name { color: var(--text); }
.pitem-cat { font-size: 9px; color: var(--dim); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.edit-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); display: inline-block; }
.tree-toggle { cursor: pointer; font-size: 9px; margin-right: 4px; color: var(--accent); user-select: none; }
.tree-toggle:hover { opacity: 0.7; }
.tree-spacer { display: inline-block; width: 13px; }
.variant-item { padding: 4px 10px 4px 22px !important; border-bottom: 1px solid var(--border1); opacity: 0.8; }
.variant-item:hover { opacity: 1; background: var(--hover) !important; }
.variant-item .pitem-id { font-size: 10px; color: var(--dim); }
.color-tag { background: var(--border2); border-radius: 3px; padding: 1px 4px; font-size: 9px; font-weight: 700; letter-spacing: 0.05em; margin-left: 2px; }
#noResults { padding: 24px; text-align: center; color: var(--muted); }

/* DETAIL */
#detail { flex: 1; overflow-y: auto; padding: 24px 30px; }
#emptyState { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60%; gap: 10px; color: var(--dim); }
#emptyState .icon { font-size: 42px; }

/* Product header */
#prodHeader { margin-bottom: 22px; }
.prod-tags { display: flex; gap: 7px; margin-bottom: 9px; flex-wrap: wrap; }
.tag { border-radius: 5px; padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.07em; }
.tag-id { background: rgba(200,240,74,0.1); color: var(--accent); border: 1px solid rgba(200,240,74,0.2); font-family: 'JetBrains Mono', monospace; }
.tag-cat { background: var(--card); color: var(--muted); border: 1px solid var(--border2); text-transform: uppercase; }
.prod-name { font-weight: 800; font-size: 30px; letter-spacing: 0.01em; line-height: 1; margin-bottom: 4px; }
.prod-lang { font-size: 12px; color: var(--muted); }

/* Field section */
.field-section { margin-bottom: 22px; }
.field-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
.field-dot { width: 3px; height: 11px; border-radius: 2px; }
.field-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.field-edited { font-size: 9px; font-weight: 700; border-radius: 4px; padding: 1px 6px; }
.field-actions { margin-left: auto; display: flex; gap: 5px; }
.btn-revert { background: transparent; border: 1px solid var(--border2); color: var(--muted); border-radius: 5px; padding: 2px 8px; font-size: 10px; cursor: pointer; font-family: inherit; }
.btn-revert:hover { color: var(--text); }
.btn-edit { border-radius: 5px; padding: 2px 10px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; border: 1px solid; transition: all 0.1s; }

/* Content display */
.short-display { padding: 10px 14px; background: var(--card); border-radius: 7px; border-left: 3px solid var(--accent); font-size: 14px; line-height: 1.6; }
.long-display { padding: 14px 16px; background: var(--card); border-radius: 7px; line-height: 1.7; }
.long-display p { margin-bottom: 10px; font-size: 13px; color: #a0a2ac; }
.long-display p:first-child { color: var(--text); font-size: 14px; }
.long-display p:last-child { color: var(--muted); font-style: italic; }
.long-display ul { list-style: none; padding: 0; margin: 8px 0 10px; display: flex; flex-direction: column; gap: 4px; }
.long-display li { padding: 7px 12px; background: var(--surface); border-left: 2px solid var(--border2); border-radius: 5px; font-size: 12px; line-height: 1.6; color: #909298; }
.long-display li:hover { border-left-color: var(--accent2); }
.long-display strong { color: var(--accent2); font-weight: 500; }
.field-textarea { width: 100%; background: var(--card); color: var(--text); border-radius: 7px; padding: 12px; font-size: 12px; line-height: 1.6; resize: vertical; outline: none; font-family: 'JetBrains Mono', monospace; box-sizing: border-box; }

/* LOADING OVERLAY */
#loadOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 1000; }
#loadOverlay .big { font-size: 40px; }
#loadOverlay p { color: var(--muted); font-size: 13px; }
#progressBar { width: 200px; height: 3px; background: var(--border2); border-radius: 2px; }
#progressFill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }

/* CONFIG MODAL */
#configModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
#configModal.open { display: flex; }
#configBox { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 24px; width: 480px; max-width: 95vw; }
#configBox h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
#configBox p { color: var(--muted); font-size: 12px; margin-bottom: 16px; line-height: 1.6; }
#configBox label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 5px; }
#scriptUrlInput { width: 100%; background: var(--card); border: 1px solid var(--border2); color: var(--text); border-radius: 7px; padding: 9px 12px; font-size: 12px; font-family: 'JetBrains Mono', monospace; outline: none; margin-bottom: 14px; }
#scriptUrlInput:focus { border-color: var(--accent); }
.config-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { background: transparent; border: 1px solid var(--border2); color: var(--muted); border-radius: 7px; padding: 7px 16px; font-size: 12px; cursor: pointer; font-family: inherit; }
.btn-save { background: var(--accent); color: var(--bg); border: none; border-radius: 7px; padding: 7px 16px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
#testResult { font-size: 11px; margin-top: 6px; min-height: 16px; }

::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── PAC-MAN ANIMATION ───────────────────────────────── */
#pacman-anim {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-left: 4px;
  vertical-align: middle;
  overflow: hidden;
  width: 220px;
  position: relative;
  height: 22px;
}
.pac {
  width: 22px; height: 22px;
  background: #c8f135;
  border-radius: 50%;
  position: absolute;
  left: 0;
  clip-path: polygon(50% 50%, 100% 15%, 100% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 85%);
  animation: pacMove 3s linear infinite, pacChew 0.2s steps(1) infinite;
}
.pac-dot {
  position: absolute;
  height: 14px;
  opacity: 1;
  animation: dotFade 3s linear infinite;
  top: 4px;
}
@keyframes pacMove {
  0%   { left: -24px; }
  100% { left: 240px; }
}
@keyframes pacChew {
  0%, 100% { clip-path: polygon(50% 50%, 100% 15%, 100% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 85%); }
  50%       { clip-path: polygon(50% 50%, 100% 48%, 100% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 52%); }
}
@keyframes dotFade {
  0%   { opacity: 1; }
  100% { opacity: 1; }
}
.pac-dot.eaten { animation: eatDot 0.1s forwards; }
@keyframes eatDot { to { opacity: 0; transform: scale(0); } }


/* ── FOOTER ─────────────────────────────────────────── */
#appFooter {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 24px; background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  gap: 8px; font-size: 10px; color: var(--dim);
  letter-spacing: 0.06em; z-index: 10;
  user-select: none;
}
#appFooter a { color: var(--dim); text-decoration: none; }
#tankBtn { cursor: pointer; display: inline-flex; align-items: center; opacity: 0.25; transition: opacity 0.2s, transform 0.15s; }
#tankBtn:hover { opacity: 0.8; transform: scale(1.2); }
.tank-bullet {
  position: fixed; font-size: 10px; pointer-events: none;
  animation: bulletFly 0.6s linear forwards;
  z-index: 9999;
}
@keyframes bulletFly {
  0%   { transform: translateX(0); opacity: 1; }
  100% { transform: translateX(300px); opacity: 0; }
}
</style>
</head>

function openConfig() {
  document.getElementById('scriptUrlInput').value = scriptUrl;
  document.getElementById('testResult').textContent = '';
  document.getElementById('configModal').classList.add('open');
}
function closeConfig() {
  document.getElementById('configModal').classList.remove('open');
}
async function testAndSave() {
  const url = document.getElementById('scriptUrlInput').value.trim();
  const el = document.getElementById('testResult');
  el.style.color = '#6b7280';
  el.textContent = 'Testuji spojení…';
  try {
    const r = await fetch(url + '?action=ping');
    const d = await r.json();
    if (d.ok) {
      el.style.color = '#4af0c2';
      el.textContent = '✓ Spojení OK – ' + d.timestamp;
      scriptUrl = url;
      localStorage.setItem('kilpi_script_url', url);
      setTimeout(() => { closeConfig(); showStatus('✓ Backend URL uložena', '#4af0c2'); }, 800);
    } else throw new Error(d.error || 'unknown');
  } catch(e) {
    el.style.color = '#f04a8a';
    el.textContent = '✗ Chyba: ' + e.message;
  }
}

// ── DATA LOADING ──────────────────────────────────────────
function changeSeason(sheet) {
  currentSheet = sheet;
  longData = {};
  currentId = null;
  expandedGroups = {};
  const empty = document.getElementById('emptyState');
  if (empty) { empty.style.display = 'flex'; const d = empty.querySelectorAll('div')[1]; if(d) d.textContent = 'Načítám sezónu…'; }
  const content = document.getElementById('prodContent');
  if (content) content.style.display = 'none';
  const pl = document.getElementById('sidebar');
  if (pl) pl.innerHTML = '';
  loadFromSheets();
}

async function loadFromSheets() {
  if (!scriptUrl) {
    setProgress(20);
    setLoadMsg('Načítám data…');
    try {
      const r = await fetch('kilpi_longs.json');
      const d = await r.json();
      longData = d;
      setProgress(100);
      hideOverlay('Nastav URL backendu tlačítkem ⚙ Backend pro ukládání změn');
      if (currentId) renderDetail(currentId);
    } catch(e) {
      setProgress(100);
      hideOverlay('Nastav URL backendu tlačítkem ⚙ Backend');
    }
    return;
  }
  setProgress(10);
  setLoadMsg('Načítám data ze Sheets…');
  try {
    const r = await fetch(scriptUrl + '?action=getAll&sheet=' + encodeURIComponent(currentSheet));
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    setProgress(70);
    setLoadMsg('Zpracovávám data…');
    d.products.forEach(p => {
      let lp = LIST_DATA.find(x => x.MODEL_ID === p.MODEL_ID);
      if (!lp) {
        lp = { MODEL_ID: p.MODEL_ID, STYLE_NAME: p.STYLE_NAME || '', GARMENT: p.GARMENT || '' };
        LIST_DATA.push(lp);
      }
      Object.keys(p).filter(k => k.startsWith('short_')).forEach(k => { lp[k] = p[k]; });
      if (!longData[p.MODEL_ID]) longData[p.MODEL_ID] = {};
      Object.keys(p).filter(k => k.startsWith('long_')).forEach(k => {
        longData[p.MODEL_ID][k] = p[k];
      });
    });
    setProgress(100);
    hideOverlay();
    buildCatFilter();
    renderList();
    if (currentId) renderDetail(currentId);
    showStatus('✓ Data načtena ze Sheets', '#4af0c2');
  } catch(e) {
    setLoadMsg('Sheets nedostupné, načítám lokálně…');
    try {
      const r2 = await fetch('kilpi_longs.json');
      const d2 = await r2.json();
      longData = d2;
    } catch(e2) {}
    setProgress(100);
    hideOverlay();
    if (currentId) renderDetail(currentId);
    showStatus('⚠ Sheets nedostupné – lokální data', '#f0c44a');
  }
}

async function saveToSheetsViaScript(modelId, field, value) {
  if (!scriptUrl) return;
  try {
    const url = scriptUrl + '?action=updateCell&modelId=' + encodeURIComponent(modelId) + '&field=' + encodeURIComponent(field) + '&value=' + encodeURIComponent(value);
    await fetch(url, { method: 'GET' });
    showStatus('✓ Uloženo', '#4af0c2');
  } catch(e) {
    showStatus('⚠ Uložení selhalo', '#f04a8a');
  }
}

function setProgress(pct) { document.getElementById('progressFill').style.width = pct + '%'; }
function setLoadMsg(msg) { document.getElementById('loadMsg').textContent = msg; }
function hideOverlay(msg) {
  if (msg) setLoadMsg(msg);
  setTimeout(() => { document.getElementById('loadOverlay').style.display = 'none'; }, msg ? 1500 : 200);
}

// ── SAVE TO SHEETS ────────────────────────────────────────
async function saveToSheets(modelId, field, value) {
  if (!scriptUrl) return;
  try {
    // Encode value as base64 to safely transmit HTML content
    // Use TextEncoder for safe base64 encoding of unicode/HTML content
    const bytes = new TextEncoder().encode(value);
    const b64 = btoa(String.fromCharCode(...bytes));
    const url = scriptUrl + '?action=updateCell&sheet=' + encodeURIComponent(currentSheet) + '&modelId=' + encodeURIComponent(modelId) + '&field=' + encodeURIComponent(field) + '&value=' + encodeURIComponent(b64);
    const r = await fetch(url);
    const d = await r.json();
    if (d.ok) {
      showStatus('✓ Uloženo do Sheets' + (d.updatedRows > 1 ? ' (+' + (d.updatedRows-1) + ' variant)' : ''), '#4af0c2');
      delete localEdits[modelId + '::' + field];
      updateEditBadge();
      // Update local data immediately – master + all variants
      if (field.startsWith('long_')) {
        if (!longData[modelId]) longData[modelId] = {};
        longData[modelId][field] = value;
        // Propagate to variant longData entries
        if (isMaster(modelId)) {
          LIST_DATA.filter(x => x.MODEL_ID.startsWith(modelId) && !isMaster(x.MODEL_ID)).forEach(v => {
            if (!longData[v.MODEL_ID]) longData[v.MODEL_ID] = {};
            longData[v.MODEL_ID][field] = value;
          });
        }
      } else if (field.startsWith('short_')) {
        const lp = LIST_DATA.find(x => x.MODEL_ID === modelId);
        if (lp) lp[field] = value;
        // Propagate to variants in LIST_DATA
        if (isMaster(modelId)) {
          LIST_DATA.filter(x => x.MODEL_ID.startsWith(modelId) && !isMaster(x.MODEL_ID)).forEach(v => { v[field] = value; });
        }
      }
    } else {
      showStatus('⚠ Chyba: ' + (d.error || 'neznámá'), '#f04a8a');
    }
  } catch(e) {
    showStatus('⚠ Sheets nedostupné', '#f04a8a');
  }
}

function scheduleAutosave(modelId, field, value) {
  clearTimeout(saveTimer);
  // Track as pending
  localEdits[modelId + '::' + field] = value;
  updateEditBadge();
  saveTimer = setTimeout(() => saveToSheets(modelId, field, value), 1200);
}

function updateEditBadge() {
  const cnt = Object.keys(localEdits).length;
  const el = document.getElementById('editBadge');
  if (cnt > 0) { el.style.display = 'inline'; el.textContent = cnt + ' čeká'; }
  else { el.style.display = 'none'; }
}

function showStatus(msg, color) {
  const el = document.getElementById('statusMsg');
  el.style.display = 'inline';
  el.style.color = color;
  el.textContent = msg;
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// ── GET VALUE ─────────────────────────────────────────────
function getValue(modelId, field) {
  const k = modelId + '::' + field;
  if (localEdits[k] !== undefined) return localEdits[k];
  const masterId = isMaster(modelId) ? modelId : modelId.slice(0, 8);
  if (field.startsWith('long_')) {
    const varVal = (longData[modelId] || {})[field];
    if (varVal) return varVal;
    return (longData[masterId] || {})[field] || '';
  }
  const p = LIST_DATA.find(x => x.MODEL_ID === modelId);
  if (p && p[field]) return p[field];
  if (!isMaster(modelId)) {
    const master = LIST_DATA.find(x => x.MODEL_ID === masterId);
    return master ? (master[field] || '') : '';
  }
  return '';
}

// ── UI SETUP ─────────────────────────────────────────────
function buildLangBar() {
  const bar = document.getElementById('langBar');
  LANGS.forEach(l => {
    const b = document.createElement('button');
    b.className = 'lpill' + (l === currentLang ? ' active' : '');
    b.textContent = l;
    b.title = LANG_NAMES[l];
    b.dataset.lang = l;
    b.onclick = () => {
      currentLang = l;
      document.querySelectorAll('.lpill').forEach(x => x.classList.toggle('active', x.dataset.lang === l));
      if (currentId) renderDetail(currentId);
    };
    bar.appendChild(b);
  });
  const cnt = document.createElement('span');
  cnt.id = 'statsText';
  bar.appendChild(cnt);
}

function buildCatFilter() {
  const sel = document.getElementById('catFilter');
  const cats = [...new Set(LIST_DATA.map(p => p.GARMENT))].sort();
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  sel.onchange = renderList;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  return LIST_DATA.filter(p => {
    if (cat && p.GARMENT !== cat) return false;
    return !q || p.MODEL_ID.toLowerCase().includes(q) ||
      p.STYLE_NAME.toLowerCase().includes(q) ||
      (p['short_' + currentLang] || '').toLowerCase().includes(q);
  });
}

function isMaster(id) { return id.length === 8; }

function renderList() {
  const sidebar = document.getElementById('sidebar');
  const filtered = getFiltered();
  const masters = filtered.filter(p => isMaster(p.MODEL_ID));
  const total = LIST_DATA.filter(p => isMaster(p.MODEL_ID));
  document.getElementById('statsText').textContent = masters.length + ' / ' + total.length;
  if (!filtered.length) { sidebar.innerHTML = '<div id="noResults">Žádné výsledky</div>'; return; }

  const groups = {};
  const order = [];
  filtered.forEach(p => {
    if (isMaster(p.MODEL_ID)) { groups[p.MODEL_ID] = { master: p, variants: [] }; order.push(p.MODEL_ID); }
  });
  filtered.forEach(p => {
    if (!isMaster(p.MODEL_ID)) {
      const base = p.MODEL_ID.slice(0, 8);
      if (groups[base]) groups[base].variants.push(p);
    }
  });

  let html = '';
  order.forEach(mid => {
    const g = groups[mid];
    const p = g.master;
    const hasEdit = Object.keys(localEdits).some(k => k.startsWith(p.MODEL_ID + '::'));
    const active = p.MODEL_ID === currentId;
    const expanded = expandedGroups[mid] || false;
    const hasVariants = g.variants.length > 0;
    html += `<div class="pitem master-item${active ? ' active' : ''}" data-id="${p.MODEL_ID}">
      <div class="pitem-id">
        ${hasVariants ? `<span class="tree-toggle" data-base="${mid}">${expanded ? '▼' : '▶'}</span>` : '<span class="tree-spacer"></span>'}
        ${p.MODEL_ID}${hasEdit ? '<span class="edit-dot"></span>' : ''}
      </div>
      <div class="pitem-name">${p.STYLE_NAME}</div>
      <div class="pitem-cat">${p.GARMENT}</div>
    </div>`;
    if (expanded && hasVariants) {
      g.variants.forEach(v => {
        const vEdit = Object.keys(localEdits).some(k => k.startsWith(v.MODEL_ID + '::'));
        const vActive = v.MODEL_ID === currentId;
        const color = v.MODEL_ID.slice(8);
        html += `<div class="pitem variant-item${vActive ? ' active' : ''}" data-id="${v.MODEL_ID}">
          <div class="pitem-id">└ <span class="color-tag">${color}</span>${vEdit ? '<span class="edit-dot"></span>' : ''}</div>
          <div class="pitem-name">${v.STYLE_NAME}</div>
        </div>`;
      });
    }
  });

  sidebar.innerHTML = html;
  sidebar.querySelectorAll('.tree-toggle').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); const base = btn.dataset.base; expandedGroups[base] = !expandedGroups[base]; renderList(); };
  });
  sidebar.querySelectorAll('.pitem').forEach(el => {
    el.onclick = (e) => { if (e.target.classList.contains('tree-toggle')) return; currentId = el.dataset.id; currentEditField = null; renderList(); renderDetail(currentId); };
  });
}

function renderDetail(modelId) {
  const p = LIST_DATA.find(x => x.MODEL_ID === modelId);
  if (!p) return;
  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.style.display = 'none';
  const content = document.getElementById('prodContent');
  if (!content) return;
  content.style.display = 'block';

  content.innerHTML = `
    <div id="prodHeader">
      <div class="prod-tags">
        <span class="tag tag-id">${p.MODEL_ID}</span>
        <span class="tag tag-cat">${p.GARMENT}</span>
      </div>
      <div class="prod-name">${p.STYLE_NAME}</div>
      <div class="prod-lang">Kilpi · ${LANG_NAMES[currentLang]}</div>
    </div>
    <div id="fields"></div>
  `;

  ['short','long'].forEach(type => {
    const field = type + '_' + currentLang;
    renderField(modelId, type, field);
  });
}

function renderField(modelId, type, field) {
  const container = document.getElementById('fields');
  const val = getValue(modelId, field);
  const isEdited = localEdits[modelId + '::' + field] !== undefined;
  const isEditing = currentEditField === field;
  const accent = type === 'short' ? 'var(--accent)' : 'var(--accent2)';
  const accentRgb = type === 'short' ? '200,240,74' : '74,240,194';

  // Remove old section if exists
  const old = document.getElementById('field-' + field);
  if (old) old.remove();

  const div = document.createElement('div');
  div.className = 'field-section';
  div.id = 'field-' + field;

  const editedBadge = isEdited ? `<span class="field-edited" style="color:${accent};background:rgba(${accentRgb},0.08);border:1px solid rgba(${accentRgb},0.2)">upraveno</span>` : '';
  const revertBtn = isEdited ? `<button class="btn-revert" data-field="${field}" data-model="${modelId}" onclick="revertField(this)">↩ Vrátit</button>` : '';
  const editBtnStyle = isEditing
    ? `background:${accent};border-color:${accent};color:var(--bg)`
    : 'background:var(--card);border-color:var(--border2);color:#b0b2be';

  let contentHtml;
  if (isEditing) {
    const rows = type === 'long' ? 14 : 3;
    contentHtml = `<textarea class="field-textarea" id="ta-${field}" rows="${rows}"
      style="border:1px solid ${accent};"
      oninput="handleTextareaInput(this,'${modelId}','${field}')">${escHtml(val)}</textarea>`;
  } else if (type === 'short') {
    contentHtml = `<div class="short-display" style="border-left-color:${accent};color:${isEdited ? accent : 'var(--text)'}">
      ${val || '<em style="color:var(--dim)">— prázdné —</em>'}
    </div>`;
  } else {
    contentHtml = `<div class="long-display">${val || '<em style="color:var(--dim)">— prázdné —</em>'}</div>`;
  }

  div.innerHTML = `
    <div class="field-header">
      <span class="field-dot" style="background:${accent}"></span>
      <span class="field-label">${type === 'short' ? 'Krátký popis' : 'Dlouhý popis'}</span>
      ${editedBadge}
      <div class="field-actions">
        ${revertBtn}
        <button class="btn-edit" style="${editBtnStyle}" onclick="toggleEdit('${modelId}','${type}','${field}')">
          ${isEditing ? '✓ Hotovo' : '✏ Upravit'}
        </button>
      </div>
    </div>
    ${contentHtml}
  `;
  container.appendChild(div);

  if (isEditing) {
    const ta = document.getElementById('ta-' + field);
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }
}

function handleTextareaInput(ta, modelId, field) {
  scheduleAutosave(modelId, field, ta.value);
}

function toggleEdit(modelId, type, field) {
  if (currentEditField === field) { currentEditField = null; }
  else { currentEditField = field; }
  renderDetail(modelId);
}

function revertField(btn) {
  const { field, model } = btn.dataset;
  delete localEdits[model + '::' + field];
  updateEditBadge();
  // Also update in sheets
  if (scriptUrl) {
    const orig = getValue(model, field);
    saveToSheets(model, field, orig);
  }
  renderDetail(model);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── EXPORT ───────────────────────────────────────────────
function exportCSV() {
  const cols = ['MODEL_ID','STYLE_NAME','GARMENT',
    ...['CZ','EN','DE','FR','IT','SK','ES','NL','RO','PL','HU','PT'].map(l=>'short_'+l),
    ...['CZ','EN','DE','FR','IT','SK','ES','NL','RO','PL','HU','PT'].map(l=>'long_'+l)
  ];
  const rows = [cols.join(',')];
  LIST_DATA.forEach(p => {
    const row = cols.map(c => {
      let v = getValue(p.MODEL_ID, c) || p[c] || '';
      v = String(v).replace(/"/g,'""');
      return '"' + v + '"';
    });
    rows.push(row.join(','));
  });
  const blob = new Blob(['\uFEFF' + rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'kilpi_edited_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// ── PAC-MAN EAT ANIMATION ────────────────────────────
(function() {
  const SPEED = 3000; // ms for full traverse
  function runPacman() {
    const dots = document.querySelectorAll('.pac-dot');
    dots.forEach(d => { d.style.opacity = '1'; d.style.transform = 'scale(1)'; });
    const pac = document.querySelector('.pac');
    if (!pac) return;
    const start = Date.now();
    const areaWidth = 220;
    function frame() {
      const elapsed = Date.now() - start;
      const progress = (elapsed % SPEED) / SPEED;
      const pacLeft = progress * (areaWidth + 24) - 24;
      dots.forEach(d => {
        const dotLeft = parseInt(d.dataset ? d.getAttribute('data-pos') : d.style.left);
        if (pacLeft > dotLeft - 4 && d.style.opacity !== '0') {
          d.style.opacity = '0';
          d.style.transform = 'scale(0)';
          d.style.transition = 'opacity 0.1s, transform 0.1s';
        }
        if (progress < 0.05) {
          d.style.opacity = '1';
          d.style.transform = 'scale(1)';
          d.style.transition = 'none';
        }
      });
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }
  window.addEventListener('load', runPacman);
})();


// ── PAC-MAN MAZE ANIMATION ───────────────────────────
(function() {
  const COLS = 5, ROWS = 3;
  const DOT_X = [80,140,200,260,320];
  const DOT_Y = [20, 80, 140];
  // Path: snake through the grid
  const path = [];
  for(let r=0; r<ROWS; r++) {
    if(r%2===0) { for(let c=0;c<COLS;c++) path.push([r,c]); }
    else         { for(let c=COLS-1;c>=0;c--) path.push([r,c]); }
  }
  let step = 0;
  let eaten = new Set();
  let interval = null;

  function movePac() {
    const pac = document.getElementById('maze-pac');
    if (!pac) return;
    if (step >= path.length) {
      // Reset
      step = 0;
      eaten.clear();
      document.querySelectorAll('.maze-dot').forEach(d => {
        d.style.opacity = '1';
        d.style.transform = 'scale(1)';
      });
    }
    const [r,c] = path[step];
    const x = DOT_X[c] - 1;
    const y = DOT_Y[r] - 1;
    pac.style.left = x + 'px';
    pac.style.top = y + 'px';
    // Eat dot at this position
    const dot = document.getElementById('mdot-' + (r*COLS+c));
    if (dot && !eaten.has(r*COLS+c)) {
      setTimeout(() => {
        dot.style.opacity = '0';
        dot.style.transform = 'scale(0)';
      }, 120);
      eaten.add(r*COLS+c);
    }
    // Pac-man mouth direction
    const next = path[step+1];
    if (next) {
      const [nr,nc] = next;
      let deg = 0;
      if (nc > c) deg = 0;
      else if (nc < c) deg = 180;
      else if (nr > r) deg = 90;
      else deg = 270;
      pac.style.transform = 'rotate(' + deg + 'deg)';
    }
    step++;
  }

  function startMaze() {
    const pac = document.getElementById('maze-pac');
    if (!pac) return;
    // Start pac at first dot
    pac.style.left = (DOT_X[0]-1) + 'px';
    pac.style.top = (DOT_Y[0]-1) + 'px';
    pac.style.clipPath = 'polygon(50% 50%, 100% 15%, 100% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 85%)';
    if (interval) clearInterval(interval);
    interval = setInterval(movePac, 400);
  }

  // Start when emptyState is visible
  const observer = new MutationObserver(() => {
    const es = document.getElementById('emptyState');
    if (es && es.style.display !== 'none') startMaze();
    else if (interval) { clearInterval(interval); interval = null; }
  });
  window.addEventListener('load', () => {
    startMaze();
    const es = document.getElementById('emptyState');
    if (es) observer.observe(es, { attributes: true, attributeFilter: ['style'] });
  });
})();

<script>
function shootTank() {
  const btn = document.getElementById('tankBtn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const bullets = ['💥','⭐','✨','💫','🔥'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'tank-bullet';
      b.textContent = bullets[i % bullets.length];
      b.style.left = (rect.right + 2) + 'px';
      b.style.top = (rect.top + rect.height/2 - 8 + (Math.random() * 10 - 5)) + 'px';
      b.style.fontSize = (10 + Math.random() * 8) + 'px';
      b.style.animationDuration = (0.4 + Math.random() * 0.3) + 's';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 800);
    }, i * 80);
  }
  btn.style.transform = 'scale(1.4) rotate(-5deg)';
  setTimeout(() => { btn.style.transform = ''; }, 300);
}
</script>
